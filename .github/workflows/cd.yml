name: CD

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release-build:
    name: Build release image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: release-build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging
        run: |
          kubectl set image deployment/devops-api \
            api=${{ env.IMAGE_NAME }}:${{ needs.release-build.outputs.image_tag }} \
            -n devops-api
          kubectl rollout status deployment/devops-api -n devops-api --timeout=120s

      - name: Smoke test
        run: |
          STAGING_URL="${{ vars.STAGING_URL }}"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/v1/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging OK"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed"
          exit 1

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [release-build, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to production
        run: |
          kubectl set image deployment/devops-api \
            api=${{ env.IMAGE_NAME }}:${{ needs.release-build.outputs.image_tag }} \
            -n devops-api
          kubectl rollout status deployment/devops-api -n devops-api --timeout=180s

      - name: Post-deployment check
        run: |
          PROD_URL="${{ vars.PRODUCTION_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/api/v1/health")
          if [ "$STATUS" != "200" ]; then
            echo "ROLLBACK - Health check failed"
            kubectl rollout undo deployment/devops-api -n devops-api
            exit 1
          fi
          echo "Production OK"
